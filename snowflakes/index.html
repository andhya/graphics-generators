<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snowflakes</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #12161c;
      --panel2: #0f1318;
      --text: #e8eef6;
      --muted: #aab6c5;
      --line: rgba(255,255,255,.10);
      --accent: #7aa7ff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background: radial-gradient(1200px 800px at 30% 10%, #141a23 0%, var(--bg) 55%);
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
      gap: 12px;
      padding: 12px;
    }
    aside {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
      overflow: auto;
    }
    aside header {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    aside header a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }
    aside header a:hover { color: var(--text); }
    aside header h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: .2px;
    }
    aside header p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    input[type="text"]::placeholder { color: rgba(232,238,246,.35); }
    .rangeLine {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 8px;
      align-items: center;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .pill {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--text);
      text-align: right;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(122,167,255,.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .2px;
    }
    .btn:hover { background: rgba(122,167,255,.2); }
    .btn.secondary {
      background: rgba(255,255,255,.04);
      color: var(--muted);
    }
    .btn.secondary:hover { background: rgba(255,255,255,.08); color: var(--text); }
    .actions {
      padding: 14px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    main {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <aside>
    <header>
      <a href="../">← all generators</a>
      <h1>Snowflakes</h1>
      <p>Random hexagonal snowflakes on a Fibonacci spiral. Port of <code style="font-size:11px;color:var(--accent)">flake.py</code> + <code style="font-size:11px;color:var(--accent)">fib.py</code>.</p>
    </header>
    <div class="section">
      <label>
        Seed
        <input type="text" id="seed" placeholder="random" />
      </label>
    </div>
    <div class="section">
      <label>
        Snowflakes
        <div class="rangeLine">
          <input type="range" id="count" min="50" max="1000" value="1000" step="50" />
          <span class="pill" id="countVal">1000</span>
        </div>
      </label>
      <label>
        Spiral spacing
        <div class="rangeLine">
          <input type="range" id="spacing" min="8" max="40" value="20" />
          <span class="pill" id="spacingVal">20</span>
        </div>
      </label>
    </div>
    <div class="actions">
      <button class="btn" id="renderBtn">Render</button>
      <button class="btn secondary" id="downloadBtn">Download PNG</button>
    </div>
  </aside>

  <main id="main">
    <canvas id="c"></canvas>
  </main>

  <script>
    // mulberry32 seeded PRNG
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function hashStr(s) {
      let h = 0x811c9dc5;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 0x01000193);
      }
      return h >>> 0;
    }

    // --- flake.py geometry, ported to JS ---

    const STROKE = 1;    // column width
    const MIDDLE = 10;   // number of random columns
    const SIZE_MAX = 3;  // max random column height
    const ANGLE = Math.PI / 3; // 60°

    function hexPoints(columns, width) {
      const tip = 0.5 * width / Math.tan(ANGLE);
      const points = [[0, 0]];
      let prev = 0;
      let x = 0;
      for (const height of columns) {
        if (height !== prev) {
          points.push([x + 0.5 * height, height]);
          const yTip = height + tip;
          const xTip = x + 0.5 * yTip + 0.5 * width;
          points.push([xTip, yTip]);
        }
        points.push([x + 0.5 * height + width, height]);
        prev = height;
        x += width;
      }
      points.push([x, 0]);
      return points;
    }

    function rotatePoints(points, radians) {
      const cos = Math.cos(radians), sin = Math.sin(radians);
      return points.map(([x, y]) => [cos * x + sin * y, -sin * x + cos * y]);
    }

    function translatePoints(points, [dx, dy]) {
      return points.map(([x, y]) => [x + dx, y + dy]);
    }

    function reflectY(points) {
      return points.map(([x, y]) => [x, -y]);
    }

    function getCore() {
      return [0.5 * STROKE, 0.5 * STROKE / Math.tan(ANGLE)];
    }

    function populateColumns(rng) {
      const cols = [0];
      for (let i = 0; i < MIDDLE; i++) cols.push(rng() * SIZE_MAX);
      return cols;
    }

    function buildFlakePoints(rng) {
      const og = getCore();
      const columns = populateColumns(rng);
      let points = hexPoints(columns, STROKE);
      points = translatePoints(points, og);

      let mirror = [...points].reverse();
      mirror.push([og[0], og[1]]);
      mirror = reflectY(mirror);

      points.push([MIDDLE + 2, 0]); // start(0) + middle(10) + end(2)
      points = points.concat(mirror);

      // 6-fold rotational symmetry — accumulate rotated copies
      for (let i = 0; i < 6; i++) {
        points = points.concat(rotatePoints(points, ANGLE));
      }

      return { og, points };
    }

    function drawFlake(ctx, cx, cy, rng) {
      const { og, points } = buildFlakePoints(rng);
      ctx.beginPath();
      ctx.moveTo(og[0] + cx, og[1] + cy);
      for (const [px, py] of points) {
        ctx.lineTo(px + cx, py + cy);
      }
      ctx.fill();
    }

    // --- fib.py spiral, ported to JS ---

    function render(exportMode = false) {
      const main = document.getElementById('main');
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');

      const seedInput = document.getElementById('seed').value.trim();
      const count = parseInt(document.getElementById('count').value);
      const spacing = parseInt(document.getElementById('spacing').value);

      // Compute bounding radius so we can size the canvas to fit
      const maxR = Math.sqrt(count) * spacing;
      const padding = 20;
      const contentSize = Math.ceil(maxR * 2 + padding * 2);

      let SIZE;
      if (exportMode) {
        SIZE = Math.max(contentSize, 1400);
      } else {
        const available = Math.min(main.clientWidth - 2, main.clientHeight - 2);
        SIZE = available;
      }

      canvas.width = SIZE;
      canvas.height = SIZE;
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';

      const seed = seedInput ? hashStr(seedInput) : (Math.random() * 0xffffffff) >>> 0;
      if (!seedInput) document.getElementById('seed').value = seed;

      const rng = mulberry32(seed);

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, SIZE, SIZE);

      // Scale so content fills the canvas
      const scale = SIZE / contentSize;
      const cx = SIZE / 2;
      const cy = SIZE / 2;

      ctx.fillStyle = '#000';

      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      for (let i = 0; i < count; i++) {
        const theta = goldenAngle * i;
        const r = Math.sqrt(i + 1) * spacing;
        const fx = r * Math.cos(theta);
        const fy = r * Math.sin(theta);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        drawFlake(ctx, fx, fy, rng);
        ctx.restore();
      }
    }

    document.getElementById('count').addEventListener('input', function() {
      document.getElementById('countVal').textContent = this.value;
    });
    document.getElementById('spacing').addEventListener('input', function() {
      document.getElementById('spacingVal').textContent = this.value;
    });

    document.getElementById('renderBtn').addEventListener('click', () => render());

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const savedSeed = document.getElementById('seed').value;
      render(true);
      const a = document.createElement('a');
      a.download = `snowflakes-${savedSeed || 'export'}.png`;
      a.href = document.getElementById('c').toDataURL('image/png');
      a.click();
      document.getElementById('seed').value = savedSeed;
      render(false);
    });

    render();
  </script>
</body>
</html>
