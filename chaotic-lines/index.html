<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chaotic Lines</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #12161c;
      --panel2: #0f1318;
      --text: #e8eef6;
      --muted: #aab6c5;
      --line: rgba(255,255,255,.10);
      --accent: #7aa7ff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background: radial-gradient(1200px 800px at 30% 10%, #141a23 0%, var(--bg) 55%);
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
      gap: 12px;
      padding: 12px;
    }
    aside {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
      overflow: auto;
    }
    aside header {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    aside header a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }
    aside header a:hover { color: var(--text); }
    aside header h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: .2px;
    }
    aside header p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    input[type="text"]::placeholder { color: rgba(232,238,246,.35); }
    .rangeLine {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 8px;
      align-items: center;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .pill {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--text);
      text-align: right;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(122,167,255,.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .2px;
    }
    .btn:hover { background: rgba(122,167,255,.2); }
    .btn.secondary {
      background: rgba(255,255,255,.04);
      color: var(--muted);
    }
    .btn.secondary:hover { background: rgba(255,255,255,.08); color: var(--text); }
    .actions {
      padding: 14px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    main {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <aside>
    <header>
      <a href="../">← all generators</a>
      <h1>Chaotic Lines</h1>
      <p>400 random lines thrown across a square canvas. Port of <code style="font-size:11px;color:var(--accent)">chaos.py</code>.</p>
    </header>
    <div class="section">
      <label>
        Seed
        <input type="text" id="seed" placeholder="random" />
      </label>
    </div>
    <div class="section">
      <label>
        Number of lines
        <div class="rangeLine">
          <input type="range" id="numLines" min="10" max="1000" value="400" />
          <span class="pill" id="numLinesVal">400</span>
        </div>
      </label>
      <label>
        Line opacity
        <div class="rangeLine">
          <input type="range" id="opacity" min="5" max="100" value="100" />
          <span class="pill" id="opacityVal">100%</span>
        </div>
      </label>
    </div>
    <div class="actions">
      <button class="btn" id="renderBtn">Render</button>
      <button class="btn secondary" id="downloadBtn">Download PNG</button>
    </div>
  </aside>

  <main>
    <canvas id="c"></canvas>
  </main>

  <script>
    // mulberry32 seeded PRNG
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function hashStr(s) {
      let h = 0x811c9dc5;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 0x01000193);
      }
      return h >>> 0;
    }

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function draw(exportMode = false) {
      const seedInput = document.getElementById('seed').value.trim();
      const numLines = parseInt(document.getElementById('numLines').value);
      const opacity = parseInt(document.getElementById('opacity').value) / 100;

      const SIZE = exportMode ? 2000 : Math.min(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight) - 2;

      canvas.width = SIZE;
      canvas.height = SIZE;

      const seed = seedInput ? hashStr(seedInput) : (Math.random() * 0xffffffff) >>> 0;
      if (!seedInput) document.getElementById('seed').value = seed;

      const rng = mulberry32(seed);
      const W = SIZE;
      const len = Math.sqrt(W * W + W * W); // diagonal — lines always cross the canvas

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, W);

      const lineColor = `rgba(26,26,41,${opacity})`;
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = exportMode ? 2 : 1;

      ctx.beginPath();
      for (let i = 0; i < numLines; i++) {
        const x1 = rng() * W;
        const y1 = rng() * W;
        const angle = rng() * Math.PI * 2;
        const x2 = x1 + len * Math.cos(angle);
        const y2 = y1 + len * Math.sin(angle);
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
      }
      ctx.stroke();
    }

    function fitCanvas() {
      const main = canvas.parentElement;
      const size = Math.min(main.clientWidth - 2, main.clientHeight - 2);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
    }

    document.getElementById('numLines').addEventListener('input', function() {
      document.getElementById('numLinesVal').textContent = this.value;
    });
    document.getElementById('opacity').addEventListener('input', function() {
      document.getElementById('opacityVal').textContent = this.value + '%';
    });

    document.getElementById('renderBtn').addEventListener('click', () => draw());

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const savedSeed = document.getElementById('seed').value;
      draw(true);
      const a = document.createElement('a');
      a.download = `chaotic-lines-${savedSeed || 'export'}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
      // Redraw at display size after export
      document.getElementById('seed').value = savedSeed;
      draw(false);
    });

    fitCanvas();
    draw();
  </script>
</body>
</html>
